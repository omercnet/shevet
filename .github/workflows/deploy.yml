name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Sanity webhook → repository_dispatch rebuilds the site on content publish.
  repository_dispatch:
    types: [sanity-publish]

permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; let a newer publish supersede an older build.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  SANITY_PROJECT_ID: cuxqs66c
  SANITY_DATASET: production
  # Build-time READ token for the private dataset (add as an Actions secret).
  SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
