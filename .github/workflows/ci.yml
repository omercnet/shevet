name: CI

on:
  pull_request:

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege.
permissions:
  contents: read

env:
  # Public Sanity project id (safe to expose — not a secret).
  SANITY_PROJECT_ID: cuxqs66c
  SANITY_DATASET: production

jobs:
  check:
    name: ${{ matrix.pkg.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - { name: web, dir: web, extra: "npm run check && npm run build" }
          - { name: studio, dir: studio, extra: "npm run typecheck && npm run build" }
    defaults:
      run:
        working-directory: ${{ matrix.pkg.dir }}
    steps:
      # Pinned to commit SHA (supply-chain hardening); version in the comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.pkg.dir }}/package-lock.json
      - run: npm ci
      - name: Lint & format (Biome)
        run: npm run lint
      - name: Typecheck & build
        run: ${{ matrix.pkg.extra }}
