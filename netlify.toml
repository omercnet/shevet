# Netlify build config. The Astro app lives in web/.
[build]
  base = "web"
  command = "npm run build"
  # Skip Git-triggered deploys that cannot affect the public site. Sanity build
  # hooks still run because they set INCOMING_HOOK_TITLE.
  ignore = "test -z \"$INCOMING_HOOK_TITLE\" && git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ../netlify.toml"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Public Sanity project id (not a secret). The private dataset READ token
  # (SANITY_TOKEN) is set in the Netlify UI → Site settings → Environment variables.
  SANITY_PROJECT_ID = "cuxqs66c"
  SANITY_DATASET = "production"

# Legacy WordPress URL redirects
[[redirects]]
  from = "/doulas-premium/*"
  to = "/doulas/:splat"
  status = 301

